name: Build Executables

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller aleatoric_composer.spec

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: AleatoricComposer-Windows
          path: dist/AleatoricComposer/
          retention-days: 30

  build-macos-arm64:
    runs-on: macos-latest  # Apple Silicon (M1/M2/M3/M4)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller aleatoric_composer.spec

      - name: Create macOS ZIP preserving .app bundle
        run: cd dist && zip -r -y ../AleatoricComposer-macOS-AppleSilicon.zip AleatoricComposer.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AleatoricComposer-macOS-AppleSilicon
          path: AleatoricComposer-macOS-AppleSilicon.zip
          retention-days: 30

  build-macos-intel:
    runs-on: macos-latest  # ARM64 runner, cross-compile via Rosetta
    env:
      ARCHFLAGS: "-arch x86_64"
    steps:
      - uses: actions/checkout@v4

      - name: Install x86_64 Python 3.11 via Rosetta
        run: |
          # python.org universal2 installer provides both arm64 and x86_64
          curl -L -o python-installer.pkg "https://www.python.org/ftp/python/3.11.9/python-3.11.9-macos11.pkg"
          sudo installer -pkg python-installer.pkg -target /
          file /usr/local/bin/python3.11
          arch -x86_64 /usr/local/bin/python3.11 --version

      - name: Install dependencies (x86_64)
        run: |
          arch -x86_64 /usr/local/bin/python3.11 -m pip install --upgrade pip
          # Install with only binary wheels to avoid cross-compilation issues
          arch -x86_64 /usr/local/bin/python3.11 -m pip install \
            --only-binary :all: \
            --platform macosx_10_9_x86_64 \
            --platform macosx_11_0_x86_64 \
            --platform macosx_10_9_universal2 \
            --platform macosx_11_0_universal2 \
            --target /tmp/x86deps \
            numpy scipy matplotlib librosa soundfile pydub pedalboard PySide6 pytest
          arch -x86_64 /usr/local/bin/python3.11 -m pip install --only-binary :all: pyinstaller
          # Add target to PYTHONPATH
          echo "PYTHONPATH=/tmp/x86deps" >> $GITHUB_ENV

      - name: Build with PyInstaller (x86_64)
        run: |
          export PYTHONPATH="/tmp/x86deps:$PYTHONPATH"
          arch -x86_64 /usr/local/bin/python3.11 -m PyInstaller aleatoric_composer.spec
          # Verify binary architecture
          file dist/AleatoricComposer.app/Contents/MacOS/AleatoricComposer

      - name: Create macOS ZIP preserving .app bundle
        run: cd dist && zip -r -y ../AleatoricComposer-macOS-Intel.zip AleatoricComposer.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AleatoricComposer-macOS-Intel
          path: AleatoricComposer-macOS-Intel.zip
          retention-days: 30
